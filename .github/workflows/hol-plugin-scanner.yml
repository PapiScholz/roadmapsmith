name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan plugin bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: HOL AI Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@50fd443330232d85fd33e505aefd25af9aba700e # v1.2.400
        with:
          plugin_dir: "plugins/roadmapsmith"
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: text
