name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test roadmap-skill (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']

    defaults:
      run:
        working-directory: roadmap-skill

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: roadmap-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: CLI help smoke test
        run: node bin/cli.js --help

      - name: CLI init dry-run smoke test
        run: node bin/cli.js init --dry-run

      - name: CLI generate dry-run smoke test
        run: node bin/cli.js generate --project-root . --dry-run --audit

      - name: CLI validate JSON smoke test
        run: node bin/cli.js validate --json --project-root .. --task prof-task-extract-compact-renderer

      - name: CLI sync dry-run audit smoke test
        run: node bin/cli.js sync --dry-run --audit --project-root ..

      - name: CLI doctor smoke test
        run: node bin/cli.js doctor --project-root ..

      - name: npm pack dry-run
        run: npm pack --dry-run

      - name: CLI --version smoke test
        run: node bin/cli.js --version

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    defaults:
      run:
        working-directory: roadmap-skill

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: roadmap-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Detectar si la versión es nueva
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view roadmapsmith version 2>/dev/null || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "is_new=true" >> $GITHUB_OUTPUT
          else
            echo "is_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Publicar en npm
        if: steps.version_check.outputs.is_new == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extraer notas del release desde CHANGELOG.md
        if: steps.version_check.outputs.is_new == 'true'
        id: changelog
        run: |
          VERSION=${{ steps.version_check.outputs.current }}
          NOTES=$(awk "/^## v$VERSION/{found=1; next} /^## v/{if(found) exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Crear GitHub Release
        if: steps.version_check.outputs.is_new == 'true'
        run: |
          gh release create "v${{ steps.version_check.outputs.current }}" \
            --title "v${{ steps.version_check.outputs.current }}" \
            --notes "${{ steps.changelog.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
