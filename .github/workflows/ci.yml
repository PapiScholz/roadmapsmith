name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test roadmap-skill (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']

    defaults:
      run:
        working-directory: roadmap-skill

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: roadmap-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: CLI help smoke test
        run: node bin/cli.js --help

      - name: CLI init dry-run smoke test
        run: node bin/cli.js init --dry-run

      - name: CLI generate dry-run smoke test
        run: node bin/cli.js generate --project-root . --dry-run --audit

      - name: CLI validate JSON smoke test
        run: node bin/cli.js validate --json --project-root .. --task mkt-p1-add-roadmapsmith-doctor-command

      - name: CLI sync dry-run audit smoke test
        run: node bin/cli.js sync --dry-run --audit --project-root ..

      - name: CLI doctor smoke test
        run: node bin/cli.js doctor --project-root ..

      - name: npm pack dry-run
        run: npm pack --dry-run
