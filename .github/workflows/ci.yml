name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test roadmap-skill (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']

    defaults:
      run:
        working-directory: roadmap-skill

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: roadmap-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pre-push QA/Regression gate
        run: npm run validate:qa-regression

      - name: Pre-push Functional/Smoke gate
        run: npm run validate:functional-smoke

      - name: Extract packed artifact and verify Codex plus Claude bundle files
        run: |
          rm -rf /tmp/roadmapsmith-pack-check
          mkdir -p /tmp/roadmapsmith-pack-check /tmp/roadmapsmith-pack-dist
          TARBALL=$(node scripts/pack-artifact.js /tmp/roadmapsmith-pack-dist)
          tar -xzf "$TARBALL" -C /tmp/roadmapsmith-pack-check
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const pkgRoot = '/tmp/roadmapsmith-pack-check/package';
          const skillsManifest = JSON.parse(fs.readFileSync(path.join(pkgRoot, 'skills.json'), 'utf8'));
          const codexPlugin = JSON.parse(fs.readFileSync(path.join(pkgRoot, '.codex-plugin', 'plugin.json'), 'utf8'));
          const requiredPaths = [
            path.join(pkgRoot, '.claude-plugin', 'plugin.json'),
            path.join(pkgRoot, '.codex-plugin', 'plugin.json'),
            ...skillsManifest.skills.map((skill) => path.join(pkgRoot, skill.path, 'SKILL.md')),
            ...[codexPlugin.interface.composerIcon, codexPlugin.interface.logo]
              .filter((assetPath) => typeof assetPath === 'string' && assetPath.startsWith('./'))
              .map((assetPath) => path.join(pkgRoot, assetPath.replace(/^\.\//, '')))
          ];

          for (const requiredPath of requiredPaths) {
            if (!fs.existsSync(requiredPath)) {
              throw new Error(`Missing packed artifact path: ${requiredPath}`);
            }
          }
          EOF
          rm -f "$TARBALL"

      - name: CLI --version smoke test
        run: node bin/cli.js --version

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: release-main
      cancel-in-progress: false

    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: roadmap-skill/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: roadmap-skill

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-patch release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: node roadmap-skill/scripts/auto-release.js

  merge-release-pr:
    name: Merge release PR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/v')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge automated release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
